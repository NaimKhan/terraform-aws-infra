# ---------------------------------------------------------------------------
# Terraform Apply — runs on push to main. Applies changes to dev/qa
# automatically, but prod requires manual approval via a GitHub
# Environment protection rule.
# ---------------------------------------------------------------------------
name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/**"

permissions:
  contents: read
  id-token: write

jobs:
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-southeast-1
      - run: terraform init
      - run: terraform apply -auto-approve -input=false -var="db_password=${{ secrets.DB_PASSWORD }}"

  apply-qa:
    name: Apply (qa)
    needs: apply-dev
    runs-on: ubuntu-latest
    environment: qa
    defaults:
      run:
        working-directory: environments/qa
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-southeast-1
      - run: terraform init
      - run: terraform apply -auto-approve -input=false -var="db_password=${{ secrets.DB_PASSWORD }}"

  apply-prod:
    name: Apply (prod)
    needs: apply-qa
    runs-on: ubuntu-latest
    # "prod" GitHub Environment has a required-reviewer protection rule
    # configured in repo settings — this job PAUSES here until a human
    # approves it, regardless of what the workflow file says.
    environment: prod
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-southeast-1
      - run: terraform init
      - run: terraform apply -auto-approve -input=false -var="db_password=${{ secrets.DB_PASSWORD }}"

# ---------------------------------------------------------------------------
# Terraform CI — runs on every Pull Request that touches Terraform code.
# Does NOT apply anything. Just validates, formats-checks, and shows a plan
# as a PR comment so reviewers can see exactly what will change.
# ---------------------------------------------------------------------------
name: Terraform CI

on:
  pull_request:
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write # needed to post the plan output as a PR comment
  id-token: write       # needed for OIDC auth to AWS (no long-lived keys)

jobs:
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, qa, prod]

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      # OIDC — GitHub Actions assumes an AWS IAM role directly, no
      # long-lived AWS access keys stored as GitHub secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          script: |
            const output = `#### Terraform Plan — \`${{ matrix.environment }}\`
            \`\`\`
            ${process.env.PLAN}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
